contract_audit_report_task:
  description: >
    你将审核合同文件《{file_name}》（办公小浣熊 OPC 作品 · 企业合同初审场景）。

    当前日期：{current_date}

    ## 知识库（@知识库 红线、案例、规则清单）
    {knowledge_context}

    ## 合同全文
    {contract_text}

    ## 规则引擎参考信号（各审核维度初筛，非终局结论）
    {rule_reference_json}

    你是最终审核决策者。请按以下方式工作：

    1. 以知识库红线与合同全文为首要依据；
    2. 将规则引擎 `dimensions` 作为必查维度清单：逐维复核 engine_signal，给出
       **最终结论**（通过 / 不通过 / 需复核）及 **最终依据**；
    3. 若修正引擎结论（如关键词误报「缺少标的」），必须引用合同原文句段说明；
    4. 数值类（税率、付款比例、价税计算）与引擎一致时可直接采纳并注明来源；
    5. 不得编造合同中不存在的事实；证据不足标需复核；
    6. 高风险项给出可粘贴进合同的修改话术。

    输出须包含：总体结论、关键字段、按维度分组的审核表（含 engine_signal vs 最终结论）、
    可复制修改建议。不要使用代码块包裹全文。
  expected_output: >
    一份中文 Markdown 合同审核报告：总体结论、关键字段、逐维度审核表
    （列：编号、维度、引擎信号、最终结论、最终依据、修改建议）、高风险清单。
  agent: contract_auditor
  markdown: true

executive_briefing_task:
  description: >
    基于上一份合同审核报告（大模型终局结论）与规则参考摘要，为管理层生成 6 页汇报 PPT 大纲。

    文件：{file_name}

    规则引擎参考摘要（仅供数据核对）：
    {rule_reference_json}

    要求：
    1) 第1页封面 2) 背景痛点 3) 关键合同数据 4) 合规总览 5) Top风险项 6) 决策建议
    2) 每页不超过 5 个要点，风格商务简洁
    3) 数据须与上一份审核报告一致，不得编造
    4) 末尾附一段「粘贴至办公小浣熊 PPT 生成」的 Prompt
  expected_output: >
    中文 Markdown 格式的 6 页汇报大纲，标题清晰，可直接复制到办公小浣熊生成 PPT。
  agent: briefing_specialist
  context:
    - contract_audit_report_task
  markdown: true
